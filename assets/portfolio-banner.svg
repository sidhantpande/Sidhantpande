<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <style>
      @keyframes float1 {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }
      @keyframes float2 {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
        100% { transform: translateY(0px); }
      }
      @keyframes pulseGlow {
        0% { opacity: 0.2; }
        50% { opacity: 0.6; }
        100% { opacity: 0.2; }
      }
      .bg-rect { fill: #0d1117; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 38px; font-weight: 800; fill: url(#textGrad); }
      .text-subtitle { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 500; fill: #8b949e; }
      .link-box { fill: rgba(255,255,255,0.05); stroke: rgba(56,189,248,0.5); stroke-width: 1px; rx: 22px; }
      .link-text { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #e6edf3; }
      .float-group-1 { animation: float1 4s ease-in-out infinite; }
      .float-group-2 { animation: float2 5s ease-in-out infinite; }
      .glow-circle-1 { fill: url(#glowGrad1); animation: pulseGlow 4s ease-in-out infinite; }
      .glow-circle-2 { fill: url(#glowGrad2); animation: pulseGlow 5s ease-in-out infinite; }
      .glow-circle-3 { fill: url(#glowGrad3); animation: pulseGlow 6s ease-in-out infinite; }
    </style>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <radialGradient id="glowGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowGrad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="15" class="bg-rect" />
  
  <!-- Glowing background orbs -->
  <circle cx="150" cy="50" r="180" class="glow-circle-1" />
  <circle cx="650" cy="150" r="200" class="glow-circle-2" />
  <circle cx="400" cy="100" r="250" class="glow-circle-3" />

  <!-- Content Group 1: Texts -->
  <g transform="translate(400, 75)" text-anchor="middle" class="float-group-1">
    <text y="0" class="text-title">✨ Explore My Interactive Portfolio</text>
    <text y="35" class="text-subtitle">Projects, Blogs &amp; Professional Experience</text>
  </g>

  <!-- Content Group 2: The Button -->
  <g transform="translate(400, 150)" text-anchor="middle" class="float-group-2">
    <rect x="-110" y="-22" width="220" height="44" class="link-box" />
    <text y="5" class="link-text">🌐 sidhantpande.in</text>
  </g>
</svg>
